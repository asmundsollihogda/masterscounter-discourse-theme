<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script>
// Add main site nav links to header
function addHeaderLinks() {
  const panel = document.querySelector('.d-header .panel');
  if (panel && !document.querySelector('.mc-header-nav')) {
    const nav = document.createElement('div');
    nav.className = 'mc-header-nav';

    const links = [
      { text: 'Courses', href: 'https://masterscounter.com/courses' },
      { text: 'Account', href: 'https://masterscounter.com/account' }
    ];

    links.forEach(function(link) {
      const a = document.createElement('a');
      a.className = 'mc-header-link';
      a.href = link.href;
      a.textContent = link.text;
      nav.appendChild(a);
    });

    panel.prepend(nav);
  }
}
document.addEventListener('DOMContentLoaded', function() {
  const observer = new MutationObserver(addHeaderLinks);
  observer.observe(document.body, { childList: true, subtree: true });
  addHeaderLinks();
});

// Close sidebar on clicking outside
document.addEventListener('click', function(e) {
  const body = document.body;
  if (!body.classList.contains('has-sidebar-page')) return;
  const sidebar = document.querySelector('.sidebar-wrapper');
  if (sidebar && !sidebar.contains(e.target) && !e.target.closest('.header-sidebar-toggle')) {
    const toggleBtn = document.querySelector('.header-sidebar-toggle button');
    if (toggleBtn) toggleBtn.click();
  }
});

// Move hamburger to far left of header on mobile
function moveHamburger() {
  if (window.innerWidth >= 768) return;
  const contents = document.querySelector('.d-header .contents');
  const hamburger = document.querySelector('.d-header .hamburger-dropdown');
  if (contents && hamburger && hamburger.parentElement !== contents) {
    contents.prepend(hamburger);
  }
}
document.addEventListener('DOMContentLoaded', function() {
  const obs = new MutationObserver(moveHamburger);
  obs.observe(document.body, { childList: true, subtree: true });
  moveHamburger();
});

// Move purpose bar and banner outside main-outlet-wrapper for full-width
document.addEventListener('DOMContentLoaded', function() {
  const observer = new MutationObserver(function() {
    const banner = document.querySelector('.custom-banner');
    const purposeBar = document.querySelector('.custom-purpose-bar');
    const header = document.querySelector('.d-header-wrap');
    if (banner && header && banner.closest('#main-outlet-wrapper')) {
      if (purposeBar) header.after(purposeBar);
      const insertAfter = purposeBar || header;
      insertAfter.after(banner);
      observer.disconnect();
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });
});
</script>
