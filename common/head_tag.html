<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script type="text/discourse-plugin" version="0.8">
api.decorateWidget('header-buttons:before', helper => {
  const siteUrl = settings.site_url || 'https://masterscounter.com';
  return helper.h('a.mc-header-btn', {
    href: siteUrl + '/courses',
    attributes: { target: '_blank' }
  }, 'Video Courses');
});
</script>

<script>
// Close sidebar on clicking outside
document.addEventListener('click', function(e) {
  const body = document.body;
  if (!body.classList.contains('has-sidebar-page')) return;
  const sidebar = document.querySelector('.sidebar-wrapper');
  if (sidebar && !sidebar.contains(e.target) && !e.target.closest('.header-sidebar-toggle')) {
    const toggleBtn = document.querySelector('.header-sidebar-toggle button');
    if (toggleBtn) toggleBtn.click();
  }
});

// Move banner outside main-outlet-wrapper for full-width
document.addEventListener('DOMContentLoaded', function() {
  const observer = new MutationObserver(function() {
    const banner = document.querySelector('.custom-banner');
    const header = document.querySelector('.d-header-wrap');
    if (banner && header && banner.closest('#main-outlet-wrapper')) {
      header.after(banner);
      observer.disconnect();
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });
});
</script>
