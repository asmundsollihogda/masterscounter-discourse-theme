<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script type="text/discourse-plugin" version="0.8">
api.decorateWidget('header-buttons:before', helper => {
  const siteUrl = settings.site_url || 'https://masterscounter.com';
  return helper.h('a.mc-header-btn', {
    href: siteUrl + '/courses',
    attributes: { target: '_blank' }
  }, 'Video Courses');
});
</script>

<script>
document.addEventListener('click', function(e) {
  const body = document.body;
  if (!body.classList.contains('has-sidebar-page')) return;
  const sidebar = document.querySelector('.sidebar-wrapper');
  if (sidebar && !sidebar.contains(e.target) && !e.target.closest('.header-sidebar-toggle')) {
    const toggleBtn = document.querySelector('.header-sidebar-toggle button');
    if (toggleBtn) toggleBtn.click();
  }
});
</script>
